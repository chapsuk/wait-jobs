version: 2

project_name: wait-jobs

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: wait-jobs
    main: ./main.go
    binary: wait-jobs
    ldflags:
      - -s -w -X github.com/chapsuk/wait-jobs/internal/buildinfo.Version={{.Version}} -X github.com/chapsuk/wait-jobs/internal/buildinfo.Commit={{.Commit}} -X github.com/chapsuk/wait-jobs/internal/buildinfo.Date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  use: github-native
